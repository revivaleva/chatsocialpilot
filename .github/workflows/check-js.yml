name: Check UI scripts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: npm ci
      - name: Run HTML script syntax checks
        run: npm run check:html-scripts


