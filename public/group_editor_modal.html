<!-- Placeholder fragment for group editor modal (not directly used) -->
<div id="groupEditorModal" style="display:none; position:fixed; left:0; top:0; right:0; bottom:0; align-items:center; justify-content:center; background:rgba(0,0,0,0.4);">
  <div style="background:#fff;padding:12px;border-radius:8px; width:90%; max-width:720px; max-height:80%; overflow:auto; position:relative;">
    <h3>グループ作成 / 編集</h3>
    <div style="margin-top:8px;">
      <div style="display:flex; gap:8px; margin-bottom:8px;">
        <input id="newGroupName" type="text" placeholder="グループ名" style="flex:1; padding:6px" />
        <input id="newGroupColor" type="color" value="#cccccc" title="色ラベル" />
      </div>
      <textarea id="newGroupDescription" placeholder="説明 (任意)" style="width:100%; min-height:80px; padding:6px"></textarea>
      <div style="margin-top:8px; display:flex; gap:8px; justify-content:flex-end;">
        <button id="createGroupBtn">作成</button>
        <button onclick="document.getElementById('groupEditorModal').style.display='none'">閉じる</button>
      </div>
    </div>
    <hr />
    <div id="groupList" style="margin-top:8px;"></div>
    <input id="groupEditorSelection" type="hidden" />
  </div>
</div>
